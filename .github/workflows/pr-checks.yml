name: PR Checks

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Ruff, mypy, and pytest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_SECRET_KEY: ci-secret-key
      GLIFESTREAM_ENABLE_SETTINGS_LOCAL: '0'
      GLIFESTREAM_LOAD_DOTENV: '0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Install development dependencies
        run: uv sync --locked --group dev

      - name: Prepare Django settings for CI
        run: |
          mkdir -p run/db run/templates run/static media static
          uv run manage.py collectstatic --no-input

      - name: Install Playwright Chromium
        run: uv run python -m playwright install --with-deps chromium

      - name: Run ruff
        run: uv run ruff check

      - name: Run ty
        run: uv run ty check

      - name: Run mypy
        run: uv run mypy .

      - name: Run pytest
        run: uv run pytest

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-playwright
          path: test-results/playwright
          if-no-files-found: ignore
